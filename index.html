<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SMHO179 | Terminal</title>

    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- PROFILE -->
    <header class="profile">
        <img src="https://github.com/SMHO179.png" class="avatar" />

        <div class="meta">
            <div class="name">SMHO179</div>
            <div class="role">Backend Developer · Go · Python · Linux</div>
        </div>
    </header>

    <!-- TERMINAL -->
    <main class="terminal" id="terminal">
        <div class="session"></div>

        <div class="input-line">
            <span class="prompt">~/portfolio $</span>
            <input id="cmd" autocomplete="off" spellcheck="false" />
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
